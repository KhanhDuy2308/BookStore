<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mục lục chọn sách</title>
    <style>
        /* Thao tác cơ bản cho trang */
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        /* 1. Nền tối phía sau cửa sổ nhỏ (Ban đầu ẩn đi) */
        .modal-overlay {
            display: none; /* Ẩn đi */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Màu đen mờ */
            z-index: 999;
        }

        /* 2. Khung cửa sổ nhỏ chứa loại sách */
        .modal-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .modal-box h3 {
            margin-top: 0;
        }

        /* Danh sách loại sách */
        .book-list {
            list-style: none;
            padding: 0;
        }

        .book-list li {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .book-list li a {
            text-decoration: none;
            color: #333;
            display: block;
        }

        .book-list li a:hover {
            color: #007bff;
        }

        /* Nút đóng cửa sổ */
        .close-btn {
            float: right;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Mục lục tài liệu</h2>
    
    <a href="#" id="openModalBtn">Ấn vào đây để chọn loại sách</a>

    <div class="modal-overlay" id="bookModal">
        <div class="modal-box">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h3>Chọn loại sách</h3>
            <ul class="book-list">
                <li><a href="#sach-giao-khoa">Văn học nước ngoài</a></li>
                <li><a href="#truyen-tranh">Tâm lý học hành vi</a></li>
                <li><a href="#sach-tin-hoc">Sách truyền cảm hứng.</a></li>
                <li><a href="#sach-ngoai-ngu">Du ký</a></li>
                <li><a href="#sach-ngoai-ngu">Sách Ngoại ngữ</a></li>
                <li><a href="#sach-ngoai-ngu">Sách Ngoại ngữ</a></li>
            </ul>
        </div>
    </div>

    <script>
        // Lấy các phần tử từ HTML
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const modal = document.getElementById('bookModal');

        // Khi ấn vào thẻ <a> -> Hiện cửa sổ lên
        openBtn.addEventListener('click', function(e) {
            e.preventDefault(); // Ngăn trang web bị nhảy lên đầu khi bấm href="#"
            modal.style.display = 'block';
        });

        // Khi ấn vào dấu X -> Ẩn cửa sổ đi
        closeBtn.addEventListener('click', function() {
            modal.style.display = 'none';
        });

        // Khi ấn ra ngoài vùng cửa sổ -> Cũng ẩn đi luôn
        window.addEventListener('click', function(e) {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });
    </script>

</body>
</html>
